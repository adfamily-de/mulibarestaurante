<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservas | Muliba</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="titulo">Reservar Mesa</h1>

<form id="reservaForm" class="form">

<input type="text" id="nome" placeholder="Nome completo" required>

<input type="tel" id="whatsapp" placeholder="WhatsApp (+258...)" required>

<input type="date" id="data" required>

<input type="time" id="hora" required>

<input type="number" id="pessoas" placeholder="Número de pessoas">

<textarea id="obs" placeholder="Observações"></textarea>

<button type="submit">Reservar via WhatsApp</button>

</form>

<script src="script.js"></script>

</body>
</html>
